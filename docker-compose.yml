version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-morning-briefing
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro
      - "C:/Users/aryan/OneDrive/Documents/Obsidian Vault:/data/obsidian-vault"

volumes:
  n8n_data:
