services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-morning-briefing
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    env_file:
      - .env
    environment:
      GENERIC_TIMEZONE: ${TIMEZONE:-America/New_York}
      TZ: ${TIMEZONE:-America/New_York}
      N8N_SECURE_COOKIE: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: fs,path
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro
      - ${OBSIDIAN_VAULT_PATH:-./demo/obsidian-vault}:/data/obsidian-vault

volumes:
  n8n_data:
